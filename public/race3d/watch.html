<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>OneChain Racing 3D - Watch Live</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #000; font-family: 'Segoe UI', system-ui, sans-serif; color: #fff; }
    canvas { display: block; position: fixed; inset: 0; z-index: 0; }

    .overlay {
      position: fixed; inset: 0; z-index: 50;
      display: none; flex-direction: column; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
    }
    .overlay.show { display: flex; }

    /* ── Loading ── */
    #loading-screen h1 {
      font-size: 2.5rem; font-weight: 900; letter-spacing: 0.15em;
      background: linear-gradient(90deg, #fff 30%, #fb923c 70%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
    }
    .loading-bar-bg { width: 280px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden; }
    .loading-bar-fill { height: 100%; width: 0%; border-radius: 3px; background: linear-gradient(90deg, #fb923c, #ef4444); transition: width 0.3s ease; }
    #loading-text { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-top: 1rem; }

    /* ── Session List ── */
    #session-screen { gap: 0; padding: 2rem; }
    #session-screen h2 {
      font-size: 1.8rem; font-weight: 900; letter-spacing: 0.12em; margin-bottom: 0.3rem;
      background: linear-gradient(90deg, #fff 30%, #fb923c 70%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    #session-screen p { color: rgba(255,255,255,0.4); font-size: 0.85rem; margin-bottom: 1.5rem; }
    #sessions-list {
      width: 100%; max-width: 480px; max-height: 55vh; overflow-y: auto;
      display: flex; flex-direction: column; gap: 10px;
    }
    .session-card {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 14px 18px; cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      display: flex; justify-content: space-between; align-items: center;
    }
    .session-card:hover { background: rgba(249,115,22,0.15); border-color: rgba(249,115,22,0.4); }
    .session-card .player-name { font-weight: 700; font-size: 0.95rem; color: #fff; }
    .session-card .session-stats { font-size: 0.75rem; color: rgba(255,255,255,0.45); margin-top: 3px; }
    .session-card .watch-badge {
      background: linear-gradient(135deg, #f97316, #ef4444);
      padding: 5px 14px; border-radius: 8px; font-size: 0.72rem;
      font-weight: 800; letter-spacing: 0.06em; white-space: nowrap;
    }
    #no-sessions {
      color: rgba(255,255,255,0.35); font-size: 0.9rem; text-align: center;
      padding: 2rem; display: none;
    }
    #refresh-btn, #back-btn-sessions {
      margin-top: 1rem; padding: 10px 28px; border: none; border-radius: 12px;
      cursor: pointer; font-size: 0.85rem; font-weight: 700; color: rgba(255,255,255,0.7);
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12);
      transition: transform 0.15s;
    }
    #refresh-btn:hover, #back-btn-sessions:hover { transform: scale(1.04); }
    .session-btn-row { display: flex; gap: 10px; }

    /* ── HUD ── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      padding: 14px 18px; display: none; justify-content: space-between; align-items: flex-start;
      pointer-events: none;
    }
    #hud.show { display: flex; }
    .hud-box {
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 8px 14px; min-width: 80px;
    }
    .hud-label { font-size: 0.6rem; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.12em; font-weight: 700; }
    .hud-value { font-size: 1.3rem; font-weight: 900; color: #fff; margin-top: 2px; }
    .hud-value.speed { color: #fb923c; }
    .hud-value.score { color: #60a5fa; }

    /* ── Spectator Badge ── */
    #watch-badge {
      position: fixed; top: 68px; left: 50%; transform: translateX(-50%); z-index: 11;
      background: rgba(239,68,68,0.85); padding: 4px 16px; border-radius: 6px;
      font-size: 0.65rem; font-weight: 800; letter-spacing: 0.1em; display: none;
    }
    #watch-badge.show { display: block; }
    #watch-player-name {
      position: fixed; top: 88px; left: 50%; transform: translateX(-50%); z-index: 11;
      color: rgba(255,255,255,0.5); font-size: 0.72rem; font-weight: 600; display: none;
      pointer-events: none;
    }
    #watch-player-name.show { display: block; }

    /* ── Session Ended ── */
    #ended-screen { background: rgba(0,0,0,0.88); }
    #ended-screen h2 { font-size: 1.8rem; font-weight: 900; color: #ef4444; margin-bottom: 0.5rem; letter-spacing: 0.1em; }
    #ended-screen p { color: rgba(255,255,255,0.5); margin-bottom: 1.5rem; }
    .btn {
      padding: 14px 36px; border: none; border-radius: 14px; cursor: pointer;
      font-size: 0.95rem; font-weight: 800; color: #fff; letter-spacing: 0.06em;
      background: linear-gradient(135deg, #f97316, #ef4444);
      box-shadow: 0 0 24px rgba(249,115,22,0.4); transition: transform 0.15s;
    }
    .btn:hover { transform: scale(1.05); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Loading Screen -->
  <div id="loading-screen" class="overlay show">
    <h1>ONECHAIN RACING</h1>
    <div class="loading-bar-bg"><div class="loading-bar-fill" id="loading-bar"></div></div>
    <div id="loading-text">Loading 3D engine...</div>
  </div>

  <!-- Session List -->
  <div id="session-screen" class="overlay">
    <h2>WATCH LIVE</h2>
    <p>Select a player to spectate their endless race</p>
    <div id="sessions-list">
      <div id="no-sessions">No active sessions right now.<br>Come back when someone is racing!</div>
    </div>
    <div class="session-btn-row">
      <button id="refresh-btn">Refresh</button>
      <button id="back-btn-sessions" onclick="window.history.back()">Back</button>
    </div>
  </div>

  <!-- Session Ended -->
  <div id="ended-screen" class="overlay">
    <h2>SESSION ENDED</h2>
    <p>The player finished their race.</p>
    <button class="btn" id="back-to-list-btn">Watch Another</button>
  </div>

  <!-- HUD (while watching) -->
  <div id="hud">
    <div class="hud-box">
      <div class="hud-label">Score</div>
      <div class="hud-value score" id="hud-score">0</div>
    </div>
    <div class="hud-box" style="text-align:center;">
      <div class="hud-label">Speed</div>
      <div class="hud-value speed" id="hud-speed">0</div>
    </div>
    <div class="hud-box" style="text-align:right;">
      <div class="hud-label">Distance</div>
      <div class="hud-value" id="hud-distance">0m</div>
    </div>
  </div>

  <!-- Spectator Badge -->
  <div id="watch-badge">SPECTATING</div>
  <div id="watch-player-name" id="watch-player-name"></div>

  <!-- Socket.io + Three.js -->
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js"></script>
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.162.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="watch.js"></script>
</body>
</html>
